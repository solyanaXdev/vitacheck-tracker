<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCheck Tracker - Smart Medicine Tracking and Expiry Notification System</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #0b0f19;
            --bg-surface: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #14b8a6;
            --primary-hover: #2dd4bf;
            --border: #1f2937;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
            --card-bg: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: 0.2s;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .logo-area h1 {
            color: var(--primary);
        }

        .theme-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            border-radius: 10px;
            cursor: pointer;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .view-card {
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: none;
            width: 100%;
            max-width: 500px;
        }

        .view-card.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-main);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .feature-square {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
        }
    </style>
</head>

<body>

<header>
    <div class="logo-area">
        <h1>VITACHECK_TRACKER</h1>
        <small>Smart Medicine System</small>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
</header>

<div class="container">

    <!-- LANDING -->
    <div class="view-card active" id="view-landing">
        <h2>Welcome</h2>
        <p>Manage your meds like a pro 😌💊</p>
        <button class="btn btn-outline" onclick="showView('view-signup')">Sign Up</button>
        <br><br>
        <button class="btn" onclick="showView('view-login')">Login</button>
    </div>

    <!-- SIGNUP -->
    <div class="view-card" id="view-signup">
        <h2>Sign Up</h2>

        <form onsubmit="handleRegistration(event)">
            <div class="form-group">
                <input id="reg-name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input id="reg-username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input id="reg-email" placeholder="Email" required>
            </div>

            <button class="btn">Create Account</button>
        </form>
    </div>

    <!-- LOGIN -->
    <div class="view-card" id="view-login">
        <h2>Login</h2>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <input id="login-username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" required>
            </div>

            <button class="btn">Login</button>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div class="view-card" id="view-dashboard" style="max-width: 1000px;">
        <h2>Dashboard</h2>
        <p>Welcome to your health hub 💊</p>

        <br>

        <div class="dashboard-grid">

            <div class="feature-square">
                <h3>Alarm Setup</h3>
                <form onsubmit="handleAlarmSetup(event)">
                    <input type="time" id="alarm-time" required>
                    <input type="email" id="alarm-email" placeholder="Email" required>
                    <textarea id="alarm-note" placeholder="Note"></textarea>
                    <button class="btn">Set Reminder</button>
                </form>
            </div>

            <div class="feature-square">
                <h3>AI Tools</h3>
                <button class="btn btn-outline" onclick="alert('AI ready')">Symptom Checker</button>
                <button class="btn btn-outline" onclick="alert('AI ready')">Side Effects</button>
            </div>

            <div class="feature-square">
                <h3>History</h3>
                <p>Metformin - Taken</p>
                <p>Vitamin D - Missed</p>
            </div>

        </div>
    </div>

</div>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

function showView(id){
    document.querySelectorAll('.view-card').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toggleTheme(){
    document.documentElement.toggleAttribute('data-theme');
}

let users = [];

function handleRegistration(e){
    e.preventDefault();

    const user = {
        name: document.getElementById('reg-name').value,
        username: document.getElementById('reg-username').value,
        email: document.getElementById('reg-email').value
    };

    users.push(user);

    alert("Account created 🎉");
    showView('view-login');
}

function handleLogin(e){
    e.preventDefault();
    alert("Login success 🚀");
    showView('view-dashboard');
}

function handleAlarmSetup(e){
    e.preventDefault();

    const time = document.getElementById('alarm-time').value;
    const email = document.getElementById('alarm-email').value;
    const note = document.getElementById('alarm-note').value;

    emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
        to_email: email,
        message: `Reminder at ${time}: ${note}`
    });

    alert("Reminder sent 📩");
}
</script>

</body>
</html>
